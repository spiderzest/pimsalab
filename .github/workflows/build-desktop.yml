name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: langfix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: langfix/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: langfix/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: langfix
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'PimSalab ${{ github.ref_name }}'
          releaseBody: |
            Download PimSalab ${{ github.ref_name }} for your platform:
            - **macOS (Apple Silicon):** .dmg file (aarch64)
            - **macOS (Intel):** .dmg file (x86_64)
            - **Windows:** .msi or .exe installer

            > Note: macOS builds are unsigned. You may need to right-click and select "Open" on first launch.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
